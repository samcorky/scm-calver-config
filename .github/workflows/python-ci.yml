name: 🛠 Python CI & Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - ".pre-commit-config.yaml"
  workflow_dispatch:

jobs:
  setup:
    name: Setup UV & Dependencies
    runs-on: ubuntu-latest
    outputs:
      uv-artifact-path: ${{ steps.artifact-path.outputs.path }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v8

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Sync test dependencies
        run: uv sync --frozen --dev

      - name: Set artifact path
        id: artifact-path
        run: echo "path=$(pwd)/.uv_env" >> "$GITHUB_OUTPUT"

      - name: Upload UV environment
        uses: actions/upload-artifact@v4
        with:
          name: uv-env
          path: .venv

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-env
          path: .venv

      - name: Run ruff incrementally
        run: ./.venv/bin/uv run pre-commit run ruff-check ruff-format --from-ref origin/main --to-ref HEAD --show-diff-on-failure

  type-check:
    name: Type Check (Mypy)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-env
          path: .venv

      - name: Run mypy incrementally
        run: ./.venv/bin/uv run pre-commit run mypy --from-ref origin/main --to-ref HEAD --show-diff-on-failure

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-env
          path: .venv

      - name: Install Python ${{ matrix.python-version }}
        run: ./.venv/bin/uv python install ${{ matrix.python-version }}

      - name: Run pytest
        run: ./.venv/bin/uv run pre-commit run pytest --all-files

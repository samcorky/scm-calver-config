name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  lint:
    name: Ruff + Mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Mypy
        run: uv run mypy .

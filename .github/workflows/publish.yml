name: Publish

on:
  release:
    types: [published]

jobs:
  run:
    name: Build and publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      # Required for Trusted Publishing
      id-token: write
      # Required for reading repository content
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Required for setuptools-scm to derive the version from Git history
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build
        run: uv build

      # Run the full test suite against the built distributions to ensure integrity
      - name: Test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl pytest

      - name: Test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz pytest

      - name: Publish
        run: uv publish

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/build-dist.yml

  publish:
    name: Publish to PyPI
    needs: build-and-test
    if: github.event_name == 'release' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Validate tag is semver (vX.Y.Z)
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -Pq '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "::error::Tag '$TAG' is not a valid semver tag (expected vX.Y.Z). Aborting publish."
            exit 1
          fi
          echo "Tag '$TAG' is valid semver. Proceeding with publish."

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Publish
        run: uv publish
